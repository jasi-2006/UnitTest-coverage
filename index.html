<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnitTest - Catálogo de Productos</title>
    <link rel="stylesheet" href="./styles/styles.css">

</head>
<body>
    <header class="header">
        <div class="container header-content">
            <h1 class="logo">🛍️ UnitTest</h1>
            <nav class="main-nav">
                <a href="#productos" class="nav-link">Productos</a>
                <a href="#categorias" class="nav-link">Categorías</a>
                <a href="#contacto" class="nav-link">Contacto</a>
                <button type="button" class="cart-btn" id="cartBtn" aria-label="Ver carrito">
                    <span class="cart-icon">🛒</span>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>
            </nav>
        </div>
    </header>

    <!-- Panel lateral del carrito -->
    <aside class="cart-panel" id="cartPanel">
        <div class="cart-panel-header">
            <h2 class="cart-panel-title">Tu carrito</h2>
            <button type="button" class="cart-close-btn" id="cartCloseBtn" aria-label="Cerrar carrito">×</button>
        </div>
        <div class="cart-panel-body" id="cartPanelBody">
            <!-- Items del carrito se renderizan aquí -->
        </div>
        <div class="cart-panel-footer" id="cartPanelFooter">
            <div class="cart-total">
                <span>Total:</span>
                <strong id="cartTotal">$0.00</strong>
            </div>
            <button type="button" class="cart-checkout-btn" id="cartCheckoutBtn">Finalizar compra</button>
        </div>
    </aside>
    <div class="cart-overlay" id="cartOverlay"></div>

    <main class="container main-content">
        <section class="filters-section">
            <h2 class="section-title">Explora Nuestros Productos</h2>
        </section>

        <!-- Catálogo de Productos -->
        <section class="products-section" id="productos">
            <div class="products-grid" id="productsGrid"></div>
        </section>
    </main>


    <script type="module" src="js/app.js"></script>
</body>
</html>
